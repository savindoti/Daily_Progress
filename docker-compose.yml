version: '3.8'
services:
  backend:
    build:
      context: ./backend
    container_name: daily_dashboard_backend
    volumes:
      - ./backend:/app
      - ./backend/db.sqlite3:/app/db.sqlite3
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: "http://backend:8000/api"
    container_name: daily_dashboard_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
